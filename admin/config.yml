backend:
  name: github
  repo: yewon4540/yewon4540.github.io
  branch: main

local_backend: true

site_url: https://blog.yewon.cloud
logo_url: https://blog.yewon.cloud/favicon.ico

media_folder: uploads
public_folder: /uploads

editor:
  preview: false

collections:
  - name: infra_cloud
    label: 인프라 / Cloud
    label_singular: Cloud 글
    folder: docs/infra/cloud
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}}"
    fields:
      - { label: 제목, name: title, widget: string }
      - { label: 레이아웃, name: layout, widget: hidden, default: post }
      - { label: 상위 카테고리, name: parent, widget: hidden, default: Cloud }
      - { label: 상위 상위 카테고리, name: grand_parent, widget: hidden, default: 인프라 }
      - { label: 정렬 순서, name: nav_order, widget: number, default: 1, value_type: int, min: 1 }
      - { label: 요약, name: description, widget: text, required: false }
      - { label: 태그, name: tags, widget: list, required: false }
      - label: 본문
        name: body
        widget: markdown
        default: |
          # 새 글 제목

          글 요약을 작성하세요.

          ---

          ## 목차

          1. [개요](#1-개요)
          2. [본문](#2-본문)
          3. [마무리](#3-마무리)

          ---

          ## 1) 개요

          내용을 작성하세요.

          ## 2) 본문

          내용을 작성하세요.

          ## 3) 마무리

          내용을 작성하세요.

