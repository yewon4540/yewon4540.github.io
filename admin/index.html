<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yewon's Tech Blog Admin</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 720px;
        margin: 48px auto;
        padding: 0 20px;
        line-height: 1.6;
        color: #1f2328;
      }

      .card {
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 24px;
        background: #f6f8fa;
      }

      code {
        background: #eaeef2;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const localhostHosts = new Set(["localhost", "127.0.0.1", "::1"]);
      const isLocalhost = localhostHosts.has(window.location.hostname);
      const app = document.getElementById("app");

      if (!isLocalhost) {
        app.innerHTML = `
          <div class="card">
            <h1>Admin 비활성화</h1>
            <p>보안을 위해 관리자 화면은 로컬 환경에서만 열리도록 설정되어 있습니다.</p>
            <p>로컬에서 <code>http://localhost:4000/admin</code> 으로 접속해 사용하세요.</p>
          </div>
        `;
      } else {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/decap-cms@3.8.3/dist/decap-cms.js";
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
